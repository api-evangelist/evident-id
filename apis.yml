    type: Documentation
  - url: https://docs.evidentid.com/v1
    type: APIReference
  - url: openapi/evident-id-openapi.yml
    type: OpenAPI
  description: VerifyAPI is a RESTful JSON API for creating a verification request
    and retrieving information about an existing request. A request is composed of
    one or more requested attributes describing what should be verified about an
    individual or business.
