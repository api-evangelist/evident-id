  - url: https://docs.evidentid.com/v1
    type: APIReference
  - url: openapi/evident-id-openapi.yml
    type: OpenAPI
  description: SubmitAPI accepts the personal data and credentials needed to satisfy
    a verification request (for example name and certificate number for a certification
    attribute), authenticated with the userIdentityToken bearer token returned by
