aid: evident-id
url: https://raw.githubusercontent.com/api-evangelist/evident-id/refs/heads/main/apis.yml
name: Evident
kind: company
description: Evident (Evident ID) is an identity and credential verification platform
  that lets businesses verify identity, background, certifications, licenses, and
  insurance (Certificate of Insurance / COI) on third parties through a single REST
  API. Its VerifyAPI and SubmitAPI orchestrate verification requests across thousands
  of attributes and authoritative data sources, returning fact-checked results with
  webhook notifications.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Identity Verification
- Credential Verification
- Background Check
- Insurance Verification
- COI
created: '2026-06-25'
modified: '2026-06-25'
specificationVersion: '0.19'
