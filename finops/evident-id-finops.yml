specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Evident
providerId: evident-id
created: '2026-06-25'
modified: '2026-06-25'
reconciled: false
tags:
- Identity Verification
- Credential Verification
- Background Check
- Insurance Verification
- COI
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Evident (Evident ID) spend. Evident's pricing is sales-led
  and quote-based, with a Pay As You Go option, Essential / Pro / Enterprise
  tiers, and discounting for businesses needing 10 or more verifications per
  month. The primary cost driver is the number and type of verifications
  performed (identity, credential, license, background check, MVR, and
  insurance / COI lines). No public unit prices are published, so cost figures
  are not reconciled in this artifact.
notes: >-
  Confirm unit and volume pricing with sales@evidentid.com. Cost meters below
  describe how spend is likely structured (per verification by attribute type)
  rather than published rates.
sources:
- https://www.evidentid.com/pricing/
- https://www.evidentid.com/pricing-contact/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Evident
serviceCategory: Identity and Verification
billingModel:
  pricingCategory: Subscription and Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Evident Verification Platform
  ServiceCategory: Identity and Verification
  ProviderName: Evident
  PublisherName: Evident
  InvoiceIssuerName: Evident
  BillingCurrency: USD
  ChargeCategory: Usage
  PricingCategory: Subscription and Usage-Based
meters:
- name: identity_verifications
  description: Identity / KYC attribute verifications performed via VerifyAPI.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - attribute_type
- name: credential_verifications
  description: Credential, license, and certification attribute verifications.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - attribute_type
- name: background_checks
  description: FCRA-compliant background checks and MVR checks.
  unit: checks
  aggregation: sum
  dimensions:
  - account
  - check_type
- name: insurance_coi_verifications
  description: Insurance / Certificate of Insurance (COI) verifications across insurance lines.
  unit: verifications
  aggregation: sum
  dimensions:
  - account
  - insurance_line
principles:
- name: Visibility
  description: Track verification counts by attribute type and supplier; reconcile against Evident invoices.
- name: Allocation
  description: Tag verification requests by team / workflow to map verification spend to cost centers.
- name: Optimization
  description: Batch verifications to reach volume discount thresholds (10+/month); request only the attributes needed per workflow.
- name: Accountability
  description: Assign owners per verification workflow; review verification volume and mix against budget monthly.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
